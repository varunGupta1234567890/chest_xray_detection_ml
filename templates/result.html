<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Result</title>

    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #667eea, #764ba2);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .card {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(12px);
            border-radius: 20px;
            padding: 30px;
            width: 400px;
            text-align: center;
            color: white;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        h1 {
            margin-bottom: 20px;
        }

        img {
            width: 220px;
            border-radius: 15px;
            margin-bottom: 20px;
            border: 3px solid rgba(255,255,255,0.3);
        }

        .label {
            font-size: 1.5em;
            font-weight: bold;
            margin-bottom: 10px;
        }

        .confidence-text {
            margin-top: 10px;
            font-size: 1.1em;
        }

        .progress-bar {
            width: 100%;
            height: 15px;
            background: rgba(255,255,255,0.2);
            border-radius: 10px;
            overflow: hidden;
            margin-top: 10px;
        }

        .progress {
            height: 100%;
            background: limegreen;
            width: {{ confidence_score }}%;
            transition: width 0.5s ease-in-out;
        }

        .btn {
            margin-top: 20px;
            display: inline-block;
            padding: 10px 20px;
            background: white;
            color: #764ba2;
            border-radius: 8px;
            text-decoration: none;
            font-weight: bold;
            transition: 0.3s;
        }

        .btn:hover {
            background: #ddd;
        }
    </style>
</head>

<body>

    <div class="card">
        <h1>🧠 Prediction Result</h1>

        <img src="{{ image_path }}" alt="Uploaded Image">

        <div class="label">
            {{ predicted_label }}
        </div>

        <div class="confidence-text">
            Confidence: {{ confidence_score }}%
        </div>

        <!-- 🔥 Progress Bar -->
        <div class="progress-bar">
            <div class="progress"></div>
        </div>

        <a href="/" class="btn">⬅ Back</a>
    </div>

</body>
</html>
